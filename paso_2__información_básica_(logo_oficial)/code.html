<!-- Input: Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2" for="full-name">
<span class="material-symbols-outlined text-sm">badge</span>
                                Nombre completo
                            </label>

</div>
<!-- Input: Email -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-sm">mail</span>
                                Email corporativo o personal
                            </label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 transition-all outline-none" id="email" placeholder="correo@ejemplo.com" type="email"/>
</div>
<!-- Input: City/Country -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2" for="location">
<span class="material-symbols-outlined text-sm">location_on</span>
                                Ciudad / País
                            </label>
